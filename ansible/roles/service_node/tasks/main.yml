---
- name: Update apt cache
  apt:
    update_cache: yes
    cache_valid_time: 3600

- name: Install service packages
  apt:
    name:
      - python3
      - python3-flask
      - snmpd
    state: present

- name: Copy service.py to node
  copy:
    src: "{{ playbook_dir }}/../service.py"
    dest: /opt/service.py
    mode: '0755'

- name: Create systemd unit for service.py
  copy:
    dest: /etc/systemd/system/service_flask.service
    content: |
      [Unit]
      Description=Flask Service
      After=network.target

      [Service]
      ExecStart=/usr/bin/python3 /opt/service.py
      Restart=always

      [Install]
      WantedBy=multi-user.target

- name: Enable and start service_flask
  systemd:
    name: service_flask
    enabled: yes
    state: started
    daemon_reload: yes

- name: Write clean SNMPd config
  copy:
    dest: /etc/snmp/snmpd.conf
    content: |
      agentAddress udp:161
      rocommunity public default
      sysLocation OpenStack Node
      sysContact admin@localhost

- name: Restart SNMPd
  systemd:
    name: snmpd
    enabled: yes
    state: restarted
