---
- name: Install HAProxy
  apt:
    name: haproxy
    state: present

- name: Install socat for UDP relay
  apt:
    name: socat
    state: present

- name: Write HAProxy config from template
  template:
    src: haproxy.cfg.j2
    dest: /etc/haproxy/haproxy.cfg
    backup: yes

- name: Enable and restart HAProxy
  systemd:
    name: haproxy
    enabled: yes
    state: restarted

- name: Write SNMP UDP relay script
  copy:
    dest: /opt/snmp_relay.sh
    mode: '0755'
    content: |
      #!/bin/bash
      NODE_IPS=({{ node_ips.split(',') | join(' ') }})
      IDX=0
      while true; do
        TARGET=${NODE_IPS[$IDX]}
        IDX=$(( (IDX+1) % ${#NODE_IPS[@]} ))
        socat UDP-RECVFROM:6000,fork UDP-SENDTO:${TARGET}:161 &
        wait $!
      done

- name: Create systemd unit for SNMP relay
  copy:
    dest: /etc/systemd/system/snmp_relay.service
    content: |
      [Unit]
      Description=SNMP UDP Relay port 6000 to nodes port 161
      After=network.target

      [Service]
      ExecStart=/opt/snmp_relay.sh
      Restart=always

      [Install]
      WantedBy=multi-user.target

- name: Enable and start SNMP relay
  systemd:
    name: snmp_relay
    enabled: yes
    state: started
    daemon_reload: yes
